<body>
<div class="app-header">
  <div>
    <h1>Fulcrum Group &amp; Collect</h1>
    <p>Performance Assessment · 2025/26</p>
  </div>
  <div class="header-right">
    <span class="badge">2025/26</span>
  </div>
</div>
<div class="nav-bar" id="nav-bar">
  <div class="nav-tab active" data-tab="employee" onclick="switchTab('employee')">Employee Self-Assessment</div>
  <div class="nav-tab" data-tab="manager" onclick="switchTab('manager')">Manager Review</div>
  <div class="nav-tab" data-tab="hr" onclick="switchTab('hr')">HR Dashboard</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIGURATION — update HR_EMAIL before deploying
// ─────────────────────────────────────────────────────────────────────────────
const CONFIG = {
  HR_EMAIL: 'info@evolvra.co.za',
  ORG_NAME: 'Fulcrum Group & Collect',
  PERIOD: '2025/2026'
};

// ─────────────────────────────────────────────────────────────────────────────
// DATA DEFINITIONS
// ─────────────────────────────────────────────────────────────────────────────
const BIZ = [
  {id:'b1',title:'Core Responsibilities',hint:'Key tasks from your job description and how you delivered on them this year.'},
  {id:'b2',title:'Quality of Work',hint:'Output standard, attention to detail, instances of error or rework.'},
  {id:'b3',title:'Problem Solving',hint:'A challenge you navigated and the approach you took.'},
  {id:'b4',title:'Ownership & Initiative',hint:'Tasks or projects you took on beyond your core role without being asked.'},
  {id:'b5',title:'Collaboration & Teamwork',hint:'How you supported colleagues and contributed to shared outcomes.'},
];
const VALS = [
  {id:'v1',title:'Agility',def:'Adapts quickly; embraces change; responds to shifting priorities with speed and composure.',
   qs:['Led others through change and anticipated adjustments before being asked?','Adapted their approach when priorities shifted and recovered quickly?','Managed change with support, even if they initially struggled?','Resisted change or became disruptive during transitions?']},
  {id:'v2',title:'Progress',def:'Pursues continuous improvement — personally, for their team, and for the business.',
   qs:['Actively drove improvement initiatives and raised the bar for those around them?','Sought feedback, acted on development opportunities, and showed measurable growth?','Showed willingness to improve when guided, even if they did not self-initiate?','Showed little to no interest in developing their skills, even when supported?']},
  {id:'v3',title:'Trust',def:'Acts with integrity; follows through on commitments; relied upon by colleagues and clients.',
   qs:['Modelled transparency and accountability unconditionally, even when difficult?','Consistently followed through on commitments and took ownership when things went wrong?','Generally kept their word but struggled to own mistakes or communicate proactively?','Broken trust through repeated failures to deliver or lack of accountability?']},
  {id:'v4',title:'Excellence',def:'Holds themselves to a high standard and takes pride in the quality of their work.',
   qs:['Set and maintained the highest standards and actively challenged others to do the same?','Produced work that reliably met the required standard and self-corrected without being asked?','Strived for quality but produced inconsistent output that required regular review?','Consistently produced work below the required standard with little concern for quality?']},
  {id:'v5',title:'Relationship',def:'Builds and sustains meaningful connections — internally with colleagues and externally with clients.',
   qs:['Actively invested in relationships that elevated the team and the business?','Maintained constructive working relationships and contributed positively to team dynamics?','Made a reasonable effort with colleagues but had notable gaps in managing key relationships?','Damaged working relationships through their behaviour or communication?']},
];
const RLABELS = {4:'Rockstar',3:'Achiever',2:'Contributor',1:'Non-Performer'};
const RCOLORS = {
  4:{bg:'#EAF4EC',border:'#A8D5B0',color:'#1A5C2A'},
  3:{bg:'#E8EFF6',border:'#A8C0D8',color:'#1B3A5C'},
  2:{bg:'#FEF3DC',border:'#E8C97A',color:'#8A5A00'},
  1:{bg:'#FDEAEA',border:'#E8AAAA',color:'#8B1A1A'}
};

// ─────────────────────────────────────────────────────────────────────────────
// STORAGE LAYER — dual mode
//   · Inside Claude.ai artifact panel  → window.storage (shared across users)
//   · External browser / GitHub Pages  → localStorage (per device, for testing)
// MIGRATION NOTE: To connect to SharePoint Lists, replace store_save_async,
// store_load, store_list, and store_delete with SharePoint REST API calls.
// ─────────────────────────────────────────────────────────────────────────────
const _CLOUD = typeof window !== 'undefined' && typeof window.storage !== 'undefined';
let _cache = {};   // used only in cloud mode
let _index = [];   // used only in cloud mode

async function initStorage() {
  if (!_CLOUD) return;
  try {
    const r = await window.storage.get('fa_pm_index', true);
    _index = r ? JSON.parse(r.value) : [];
  } catch(e) { _index = []; }
  for (const entry of _index) {
    try {
      const r = await window.storage.get('fa_pm_sub_' + entry.id, true);
      if (r) _cache['sub_' + entry.id] = JSON.parse(r.value);
    } catch(e) {}
  }
}

function _updateIndex(key, data) {
  if (!key.startsWith('sub_')) return;
  const id = key.slice(4);
  const entry = { id, name: data.name, role: data.role, dept: data.dept, submittedAt: data.submittedAt, status: data.status };
  const i = _index.findIndex(x => x.id === id);
  if (i >= 0) _index[i] = entry; else _index.push(entry);
}

async function store_save_async(key, data) {
  if (_CLOUD) {
    _cache[key] = data;
    _updateIndex(key, data);
    await window.storage.set('fa_pm_' + key, JSON.stringify(data), true);
    await window.storage.set('fa_pm_index', JSON.stringify(_index), true);
  } else {
    localStorage.setItem('fulcrum_pm_' + key, JSON.stringify(data));
  }
}

function store_save(key, data) {
  if (_CLOUD) {
    _cache[key] = data;
    _updateIndex(key, data);
    window.storage.set('fa_pm_' + key, JSON.stringify(data), true).catch(() => {});
    window.storage.set('fa_pm_index', JSON.stringify(_index), true).catch(() => {});
  } else {
    localStorage.setItem('fulcrum_pm_' + key, JSON.stringify(data));
  }
}

function store_load(key) {
  if (_CLOUD) return _cache[key] || null;
  const d = localStorage.getItem('fulcrum_pm_' + key);
  return d ? JSON.parse(d) : null;
}

function store_list() {
  if (_CLOUD) {
    return _index
      .map(e => _cache['sub_' + e.id])
      .filter(Boolean)
      .sort((a, b) => new Date(b.submittedAt || 0) - new Date(a.submittedAt || 0));
  }
  const prefix = 'fulcrum_pm_sub_';
  const items = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(prefix)) {
      try { items.push(JSON.parse(localStorage.getItem(k))); } catch(e) {}
    }
  }
  return items.sort((a, b) => new Date(b.submittedAt || 0) - new Date(a.submittedAt || 0));
}

function store_delete(id) {
  if (_CLOUD) {
    delete _cache['sub_' + id];
    _index = _index.filter(x => x.id !== id);
    window.storage.delete('fa_pm_sub_' + id, true).catch(() => {});
    window.storage.set('fa_pm_index', JSON.stringify(_index), true).catch(() => {});
  } else {
    localStorage.removeItem('fulcrum_pm_sub_' + id);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────────────────────────────────────
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}
function avg(arr) {
  const v = arr.filter(x => x > 0);
  return v.length ? +(v.reduce((a,b) => a+b, 0) / v.length).toFixed(2) : null;
}
function calcScores(ratings) {
  const biz = BIZ.map(d => parseInt(ratings['r_'+d.id]||0));
  const val = VALS.map(d => parseInt(ratings['r_'+d.id]||0));
  const bs = avg(biz), vs = avg(val);
  const fs = (bs && vs) ? +((bs+vs)/2).toFixed(2) : null;
  return {bs, vs, fs};
}
function badgeHTML(score, small) {
  if (!score) return `<span class="sbadge" style="background:#F6F5F2;color:#6B6760">Not rated</span>`;
  const r = Math.round(score), c = RCOLORS[r]||RCOLORS[3];
  const sz = small ? 'font-size:9px' : '';
  return `<span class="sbadge" style="background:${c.bg};color:${c.color};border:0.5px solid ${c.border};${sz}">${RLABELS[r]}</span>`;
}
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'});
}
function toast(msg, dur=3500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}
function getURLParam(p) {
  return new URLSearchParams(window.location.search).get(p);
}

function buildDimRow(dim, isVal, isMgr) {
  const pfx = isMgr ? 'mgr_' : 'emp_';
  let bodyHTML = '';

  if (isVal) {
    const qsHtml = dim.qs.map((q,i) => `<div class="q q${4-i}"><strong>${4-i}:</strong> ${q}</div>`).join('');
    if (isMgr) {
      const sub = currentSubId ? store_load('sub_'+currentSubId) : null;
      const empEv = sub ? (sub.evidence && sub.evidence[dim.id] || '') : '';
      const empR = sub ? (sub.ratings && sub.ratings['r_'+dim.id]) : null;
      const badge = empR ? badgeHTML(empR, true) : '';
      bodyHTML = `<div class="dim-body"><div class="qs">${qsHtml}</div>
        <div class="two-col">
          <div><span class="ev-lbl" style="color:#1B3A5C">Employee evidence ${badge}</span><div class="emp-ev ${empEv?'':'empty'}">${empEv||'No evidence submitted.'}</div></div>
          <div><span class="ev-lbl" style="color:#1B3A5C">Your assessment notes</span><textarea id="${pfx}ev_${dim.id}" rows="3" placeholder="Your observations..."></textarea></div>
        </div></div>`;
    } else {
      bodyHTML = `<div class="dim-body"><div class="qs">${qsHtml}</div>
        <label>Behavioural evidence — one specific example from the past 12 months (required)</label>
        <textarea id="${pfx}ev_${dim.id}" rows="3" placeholder="What did you do? Describe the situation, your actions, and the outcome..."></textarea></div>`;
    }
  } else {
    if (isMgr) {
      const sub = currentSubId ? store_load('sub_'+currentSubId) : null;
      const empEv = sub ? (sub.evidence && sub.evidence[dim.id] || '') : '';
      const empR = sub ? (sub.ratings && sub.ratings['r_'+dim.id]) : null;
      const badge = empR ? badgeHTML(empR, true) : '';
      bodyHTML = `<div class="dim-body"><div class="two-col">
        <div><span class="ev-lbl" style="color:#1B3A5C">Employee evidence ${badge}</span><div class="emp-ev ${empEv?'':'empty'}">${empEv||'No evidence submitted.'}</div></div>
        <div><span class="ev-lbl" style="color:#1B3A5C">Rating rationale</span><textarea id="${pfx}ev_${dim.id}" rows="3" placeholder="Explain your rating for this dimension..."></textarea></div>
      </div></div>`;
    } else {
      bodyHTML = `<div class="dim-body"><label>Evidence — what did you do and what was the impact?</label>
        <textarea id="${pfx}ev_${dim.id}" rows="3" placeholder="Describe your actions and outcomes this year..."></textarea></div>`;
    }
  }

  const rArr = isMgr ? mgrRatings : empRatings;
  const curR = parseInt(rArr['r_'+dim.id]||0);
  const pills = [4,3,2,1].map(n =>
    `<div class="pill p${n}${curR===n?' active':''}" onclick="rateDim('${dim.id}',${n},${isMgr})">${n}</div>`
  ).join('');

  return `<div class="dim" id="dim_${isMgr?'mgr':'emp'}_${dim.id}">
    <div class="dim-head">
      <div class="dim-info"><div class="dim-title">${dim.title}</div><div class="dim-hint">${isVal?dim.def:dim.hint}</div></div>
      <div class="pills">${pills}</div>
    </div>${bodyHTML}</div>`;
}

function buildScoreBox(isMgr) {
  const scores = calcScores(isMgr ? mgrRatings : empRatings);
  return `<div class="score-box">
    <div class="score-head"><h2>Score Summary</h2></div>
    <div class="score-grid">
      <div class="score-cell"><div class="lbl">Business Score</div><div class="val" id="${isMgr?'mgr':'emp'}_sc_biz" style="color:${scores.bs?'#1B3A5C':'#ccc'}">${scores.bs||'—'}</div><div style="font-size:11px;color:#6B6760;margin-bottom:4px">out of 4</div><div id="${isMgr?'mgr':'emp'}_sc_biz_b">${badgeHTML(scores.bs)}</div></div>
      <div class="score-cell"><div class="lbl">Values Score</div><div class="val" id="${isMgr?'mgr':'emp'}_sc_val" style="color:${scores.vs?'#1E7A6E':'#ccc'}">${scores.vs||'—'}</div><div style="font-size:11px;color:#6B6760;margin-bottom:4px">out of 4</div><div id="${isMgr?'mgr':'emp'}_sc_val_b">${badgeHTML(scores.vs)}</div></div>
      <div class="score-cell"><div class="lbl">Final Rating</div><div class="val" id="${isMgr?'mgr':'emp'}_sc_fin">${scores.fs||'—'}</div><div style="font-size:11px;color:rgba(255,255,255,.45);margin-bottom:4px">out of 4</div><div id="${isMgr?'mgr':'emp'}_sc_fin_b">${badgeHTML(scores.fs)}</div></div>
    </div>
    <div class="narr">
      <div><label>Overall Strengths This Year</label><textarea id="${isMgr?'mgr':'emp'}_strengths" rows="3" placeholder="Key strengths demonstrated during this review period..."></textarea></div>
      <div><label>Areas for Development</label><textarea id="${isMgr?'mgr':'emp'}_development" rows="3" placeholder="Priority development areas for the next cycle..."></textarea></div>
    </div>
    <div class="action-bar">
      <button class="btn" onclick="resetForm(${isMgr})">↺ Reset</button>
      ${isMgr
        ? `<button class="btn btn-navy" onclick="submitManager()">✓ Save Manager Review</button>`
        : `<button class="btn btn-teal" onclick="submitEmployee()">✓ Submit Self-Assessment</button>`}
    </div>
    <div class="calib-note"><strong>Calibration note:</strong> All ratings are subject to executive calibration before being communicated. A Rockstar rating requires full evidence across all five values and all business dimensions. · ${CONFIG.ORG_NAME} · Evolvra People Solutions · 2026</div>
  </div>`;
}

function rateDim(id, val, isMgr) {
  const rObj = isMgr ? mgrRatings : empRatings;
  rObj['r_'+id] = val;
  const prefix = isMgr ? 'mgr' : 'emp';
  const dim = document.getElementById(`dim_${prefix}_${id}`);
  if (dim) {
    dim.querySelectorAll('.pill').forEach(p => {
      const pv = parseInt(p.textContent);
      p.className = `pill p${pv}${pv===val?' active':''}`;
    });
  }
  updateScores(isMgr);
}

function applyRatings(rObj, isMgr) {
  Object.keys(rObj).forEach(key => {
    if (key.startsWith('r_')) {
      const id = key.slice(2);
      rateDim(id, parseInt(rObj[key]), isMgr);
    }
  });
}

function updateScores(isMgr) {
  const p = isMgr ? 'mgr' : 'emp';
  const s = calcScores(isMgr ? mgrRatings : empRatings);
  const set = (id, val, col) => { const el=document.getElementById(id); if(el){el.textContent=val||'—';if(col&&val)el.style.color=col;} };
  const setB = (id, score) => { const el=document.getElementById(id); if(el) el.innerHTML=badgeHTML(score); };
  set(p+'_sc_biz', s.bs, '#1B3A5C');
  set(p+'_sc_val', s.vs, '#1E7A6E');
  set(p+'_sc_fin', s.fs, null);
  setB(p+'_sc_biz_b', s.bs);
  setB(p+'_sc_val_b', s.vs);
  setB(p+'_sc_fin_b', s.fs);
}

function gatherEvidence(isMgr) {
  const pfx = isMgr ? 'mgr_' : 'emp_';
  const ev = {};
  [...BIZ,...VALS].forEach(d => {
    const el = document.getElementById(pfx+'ev_'+d.id);
    if (el) ev[d.id] = el.value;
  });
  return ev;
}

function validateEmployee() {
  const req = ['f_name','f_role','f_dept','f_mgr','f_mgr_email'];
  for (const id of req) {
    const el = document.getElementById(id);
    if (!el || !el.value.trim()) {
      toast('Please fill in all required fields (marked with *).'); return false;
    }
  }
  const rated = [...BIZ,...VALS].every(d => empRatings['r_'+d.id] > 0);
  if (!rated) { toast('Please rate all 10 dimensions before submitting.'); return false; }
  return true;
}

async function submitEmployee() {
  if (!validateEmployee()) return;
  const scores = calcScores(empRatings);
  const id = uid();
  const sub = {
    id,
    name: document.getElementById('f_name').value.trim(),
    role: document.getElementById('f_role').value.trim(),
    dept: document.getElementById('f_dept').value.trim(),
    manager: document.getElementById('f_mgr').value.trim(),
    managerEmail: document.getElementById('f_mgr_email').value.trim(),
    period: CONFIG.PERIOD,
    ratings: {...empRatings},
    evidence: gatherEvidence(false),
    strengths: document.getElementById('emp_strengths')?.value||'',
    development: document.getElementById('emp_development')?.value||'',
    bizScore: scores.bs,
    valScore: scores.vs,
    finalScore: scores.fs,
    finalCategory: scores.fs ? RLABELS[Math.round(scores.fs)] : null,
    submittedAt: new Date().toISOString(),
    status: 'self_submitted',
    mgrReview: null,
    hrCalib: null
  };
  try {
    await store_save_async('sub_'+id, sub);
    currentSubId = id;
    empRatings = {};
    showSuccess = true;
    render();
    sendManagerEmail(sub);
  } catch(e) {
    toast('Failed to save. Please try again. Error: ' + e.message);
  }
}

function sendManagerEmail(sub) {
  const baseURL = window.location.href.split('?')[0];
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(sub))));
  const reviewURL = `${baseURL}?tab=manager&id=${sub.id}&d=${encoded}`;
  const scores = `Business: ${sub.bizScore||'?'}/4 | Values: ${sub.valScore||'?'}/4 | Final: ${sub.finalScore||'?'}/4 (${sub.finalCategory||'?'})`;
  const subject = encodeURIComponent(`[Action Required] ${sub.name} — Performance Self-Assessment 2025/26`);
  const body = encodeURIComponent(
    `Dear ${sub.manager},\n\n${sub.name} has submitted their performance self-assessment for 2025/26 and it is ready for your review.\n\nEmployee: ${sub.name}\nRole: ${sub.role}\nDepartment: ${sub.dept}\nSelf-assessment scores: ${scores}\n\nPlease click the link below to open the form and complete your manager review:\n${reviewURL}\n\nOnce you have submitted your review, HR will be notified automatically for calibration.\n\nKind regards,\nHR · ${CONFIG.ORG_NAME}`
  );
  window.location.href = `mailto:${sub.managerEmail}?subject=${subject}&body=${body}`;
}

  const sub = currentSubId ? store_load('sub_'+currentSubId) : null;
  let html = `<div class="card"><div class="card-body"><div class="success-screen">
    <div class="icon">✅</div>
    <h2>Self-Assessment Submitted</h2>
    <p>Your self-assessment has been saved. An email to your manager has been prepared — please check your email client and send it.</p>`;

    const scores = calcScores(sub.ratings||{});
    html += `<div class="rating-summary-grid">
      <div class="rs-cell"><div class="rt">Business</div><div class="rv" style="color:#1B3A5C">${sub.bizScore||'—'}</div></div>
      <div class="rs-cell"><div class="rt">Values</div><div class="rv" style="color:#1E7A6E">${sub.valScore||'—'}</div></div>
      <div class="rs-cell"><div class="rt">Final</div><div class="rv" style="color:#1B3A5C">${sub.finalScore||'—'}</div></div>
      <div class="rs-cell"><div class="rt">Category</div><div class="rv" style="color:#1A5C2A;font-size:12px">${sub.finalCategory||'—'}</div></div>
      <div class="rs-cell"><div class="rt">Status</div><div class="rv" style="font-size:11px">⏳ Awaiting manager</div></div>
    </div>`;
    html += `<div style="margin-top:12px"><button class="btn btn-teal btn-sm" onclick="resendManagerEmail('${sub.id}')">📧 Resend email to manager</button></div>`;
  }

    <button class="btn" style="margin-top:12px" onclick="showSuccess=false;empRatings={};currentSubId=null;render()">Submit another assessment</button>
  </div></div></div>`;

}

function resendManagerEmail(id) {
  const sub = store_load('sub_'+id);
  if (sub) sendManagerEmail(sub);
}

function renderManager() {
  const paramId = getURLParam('id');
  const paramTab = getURLParam('tab');
  const paramData = getURLParam('d');
  if (paramTab === 'manager' && paramId && !currentSubId) {
    currentSubId = paramId;
    if (paramData && !store_load('sub_'+paramId)) {
      try {
        const decoded = JSON.parse(decodeURIComponent(escape(atob(paramData))));
        store_save('sub_'+paramId, decoded);
      } catch(e) {}
    }
  }

  if (!currentSubId) {
    renderManagerSearch(); return;
  }

  const sub = store_load('sub_'+currentSubId);
  if (!sub) {
    document.getElementById('main').innerHTML = `<div class="card"><div class="card-body"><div class="empty-state"><div class="icon">🔍</div><p>Submission not found. The ID may be incorrect or the assessment was submitted on a different device.</p><button class="btn" onclick="currentSubId=null;render()">← Go back</button></div></div></div>`;
    return;
  }

  if (sub.status === 'mgr_reviewed' || sub.status === 'hr_calibrated' || sub.status === 'final') {
    document.getElementById('main').innerHTML = `<div class="card"><div class="card-body"><div class="empty-state"><div class="icon">✅</div><p>You have already submitted your manager review for <strong>${sub.name}</strong>.</p><button class="btn" onclick="currentSubId=null;render()">← Review another employee</button></div></div></div>`;
    return;
  }

  if (showSuccess) { renderManagerSuccess(sub); return; }

  let html = `<div class="banner"><strong>Manager review for ${sub.name}:</strong> The employee's self-assessment is shown on the left. Add your independent rating and rationale on the right. Rate each dimension based on your direct observations.</div>`;

  html += `<div class="card">
    <div class="card-head"><h2>Employee Details</h2></div>
    <div class="card-body"><div class="detail-grid">
      <div class="field"><label>Employee</label><input type="text" value="${sub.name}" readonly></div>
      <div class="field"><label>Role</label><input type="text" value="${sub.role}" readonly></div>
      <div class="field"><label>Department</label><input type="text" value="${sub.dept}" readonly></div>
      <div class="field"><label>Your Name *</label><input type="text" id="mgr_name" placeholder="Your full name"></div>
      <div class="field"><label>Your Email *</label><input type="email" id="mgr_email" placeholder="your@email.co.za"></div>
      <div class="field"><label>Period</label><input type="text" value="${CONFIG.PERIOD}" readonly></div>
    </div></div></div>`;

  html += `<div class="card">
    <div class="card-head"><span class="step-pill">Section A</span><h2>Business Performance — Manager Review</h2></div>
    <div class="card-body">${BIZ.map(d => buildDimRow(d, false, true)).join('')}</div></div>`;

  html += `<div class="card">
    <div class="card-head"><span class="step-pill">Section B</span><h2>Company Values — Manager Review</h2></div>
    <div class="card-body">${VALS.map(d => buildDimRow(d, true, true)).join('')}</div></div>`;

  html += buildScoreBox(true);
  document.getElementById('main').innerHTML = html;
  applyRatings(mgrRatings, true);
  updateScores(true);
}

function renderManagerSearch() {
  const subs = store_list().filter(s => s.status === 'self_submitted');
  let html = `<div class="banner"><strong>Manager review:</strong> Select an employee from the list below, or paste their submission ID to open their self-assessment for review. If the list is empty, the employee has not yet submitted their self-assessment.</div>`;

  html += `<div class="card">
    <div class="card-head"><h2>Find Submission by ID</h2></div>
    <div class="card-body" style="display:flex;gap:10px;align-items:flex-end">
      <div class="field" style="flex:1"><label>Submission ID</label><input type="text" id="sub_id_input" placeholder="Paste the ID from the employee's notification email"></div>
      <button class="btn btn-navy" onclick="loadSubById()">Open</button>
    </div></div>`;

  if (subs.length > 0) {
    html += `<div class="card">
      <div class="card-head"><h2>Awaiting Your Review (${subs.length})</h2></div>
      <div class="card-body" style="padding:0;overflow-x:auto"><table class="tbl">
        <thead><tr><th>Employee</th><th>Role</th><th>Dept</th><th>Self Rating</th><th>Submitted</th><th></th></tr></thead>
        <tbody>`;
    subs.forEach(s => {
      html += `<tr>
        <td style="font-weight:600;color:#1B3A5C">${s.name}</td>
        <td>${s.role}</td><td>${s.dept}</td>
        <td>${badgeHTML(s.finalScore, true)}</td>
        <td>${fmtDate(s.submittedAt)}</td>
        <td><button class="btn btn-teal btn-sm" onclick="currentSubId='${s.id}';mgrRatings={};render()">Review →</button></td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;
  } else {
    html += `<div class="card"><div class="card-body"><div class="empty-state"><div class="icon">📋</div><p>No self-assessments are awaiting review yet.</p><p style="font-size:11px;margin-top:6px">Share the form link with employees and ask them to submit their self-assessment first.</p></div></div></div>`;
  }
  document.getElementById('main').innerHTML = html;
}

function loadSubById() {
  const id = document.getElementById('sub_id_input')?.value?.trim();
  if (!id) { toast('Please enter a submission ID.'); return; }
  const sub = store_load('sub_'+id);
  if (!sub) { toast('No submission found for that ID. Check the ID and try again.'); return; }
  currentSubId = id;
  mgrRatings = {};
  render();
}

async function submitManager() {
  const mgrName = document.getElementById('mgr_name')?.value?.trim();
  const mgrEmail = document.getElementById('mgr_email')?.value?.trim();
  if (!mgrName || !mgrEmail) { toast('Please enter your name and email address.'); return; }
  const rated = [...BIZ,...VALS].every(d => mgrRatings['r_'+d.id] > 0);
  if (!rated) { toast('Please rate all 10 dimensions before saving.'); return; }

  const sub = store_load('sub_'+currentSubId);
  if (!sub) { toast('Error: submission not found.'); return; }

  const scores = calcScores(mgrRatings);
  sub.mgrReview = {
    mgrName, mgrEmail,
    ratings: {...mgrRatings},
    evidence: gatherEvidence(true),
    strengths: document.getElementById('mgr_strengths')?.value||'',
    development: document.getElementById('mgr_development')?.value||'',
    bizScore: scores.bs,
    valScore: scores.vs,
    finalScore: scores.fs,
    finalCategory: scores.fs ? RLABELS[Math.round(scores.fs)] : null,
    reviewedAt: new Date().toISOString()
  };
  sub.status = 'mgr_reviewed';
  try {
    await store_save_async('sub_'+currentSubId, sub);
    mgrRatings = {};
    showSuccess = true;
    render();
    sendHREmail(sub);
  } catch(e) {
    toast('Failed to save. Please try again. Error: ' + e.message);
  }
}

function sendHREmail(sub) {
  const m = sub.mgrReview;
  const baseURL = window.location.href.split('?')[0];
  const hrURL = `${baseURL}?tab=hr`;
  const subject = encodeURIComponent(`[HR Calibration] ${sub.name} — Manager Review Complete`);
  const body = encodeURIComponent(
    `Dear HR Team,\n\nThe manager review for ${sub.name} has been completed and is ready for HR calibration.\n\nEmployee: ${sub.name} (${sub.role}, ${sub.dept})\nManager: ${m.mgrName}\n\nEmployee self-assessment final score: ${sub.finalScore||'?'}/4 — ${sub.finalCategory||'?'}\nManager review final score: ${m.finalScore||'?'}/4 — ${m.finalCategory||'?'}\n\nPlease log in to the HR Dashboard to review and calibrate:\n${hrURL}\n\nSubmission ID: ${sub.id}\n\nKind regards,\nAutomated notification · ${CONFIG.ORG_NAME}`
  );
  window.location.href = `mailto:${CONFIG.HR_EMAIL}?subject=${subject}&body=${body}`;
}

function renderManagerSuccess(sub) {
  const m = sub.mgrReview;
  document.getElementById('main').innerHTML = `<div class="card"><div class="card-body"><div class="success-screen">
    <div class="icon">✅</div>
    <h2>Manager Review Saved</h2>
    <p>Your review for <strong>${sub.name}</strong> has been saved. An email to HR (${CONFIG.HR_EMAIL}) has been prepared — please check your email client and send it.</p>
    <div class="rating-summary-grid">
      <div class="rs-cell"><div class="rt">Biz Score</div><div class="rv" style="color:#1B3A5C">${m?.bizScore||'—'}</div></div>
      <div class="rs-cell"><div class="rt">Values</div><div class="rv" style="color:#1E7A6E">${m?.valScore||'—'}</div></div>
      <div class="rs-cell"><div class="rt">Final</div><div class="rv">${m?.finalScore||'—'}</div></div>
      <div class="rs-cell"><div class="rt">Category</div><div class="rv" style="font-size:11px;color:#1A5C2A">${m?.finalCategory||'—'}</div></div>
      <div class="rs-cell"><div class="rt">Status</div><div class="rv" style="font-size:11px">⏳ HR Calibration</div></div>
    </div>
    <button class="btn" style="margin-top:16px" onclick="showSuccess=false;currentSubId=null;mgrRatings={};render()">Review another employee</button>
  </div></div></div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// HR DASHBOARD TAB
// ─────────────────────────────────────────────────────────────────────────────
function renderHR() {
  const all = store_list();
  const total = all.length;
  const mgrDone = all.filter(s => s.status !== 'self_submitted').length;
  const calibrated = all.filter(s => s.status === 'hr_calibrated' || s.status === 'final').length;
  const final = all.filter(s => s.status === 'final').length;
  const dist = {4:0,3:0,2:0,1:0};
  all.forEach(s => {
    const score = s.mgrReview?.finalScore || s.finalScore;
    if (score) dist[Math.round(score)]++;
  });

  let html = `<div class="banner"><strong>HR Dashboard:</strong> Live view of all submissions. Use this view to track progress, calibrate ratings, and generate reports. All ratings shown are provisional until marked as Final.</div>`;

  html += `<div class="stat-row">
    <div class="stat"><div class="sv">${total}</div><div class="sl">Self-Assessments</div></div>
    <div class="stat"><div class="sv">${mgrDone}</div><div class="sl">Manager Reviews</div></div>
    <div class="stat"><div class="sv">${calibrated}</div><div class="sl">Calibrated</div></div>
    <div class="stat"><div class="sv" style="color:#1A5C2A">${final}</div><div class="sl">Finalised</div></div>
    <div class="stat"><div class="sv" style="color:#8B1A1A">${total-mgrDone}</div><div class="sl">Pending Review</div></div>
  </div>`;

  // Distribution vs bell curve
  html += `<div class="card">
    <div class="card-head"><h2>Rating Distribution vs Expected Bell Curve</h2></div>
    <div class="card-body" style="padding:0;overflow-x:auto"><table class="tbl">
      <thead><tr><th>Category</th><th>Count</th><th>Actual %</th><th>Expected %</th><th>Variance</th></tr></thead><tbody>`;
  const exp = {4:10,3:40,2:40,1:10};
  [4,3,2,1].forEach(r => {
    const n = dist[r]||0, pct = total ? Math.round(n/total*100) : 0, e = exp[r], diff = pct-e;
    const c = RCOLORS[r];
    const status = total===0?'—': Math.abs(diff)<=10
      ? `<span style="color:#1A5C2A">✓ Within range</span>`
      : `<span style="color:#8B1A1A">⚠ ${diff>0?'+':''}${diff}% vs expected</span>`;
    html += `<tr><td><span class="sbadge" style="background:${c.bg};color:${c.color};border:0.5px solid ${c.border}">${RLABELS[r]}</span></td><td>${n}</td><td>${pct}%</td><td>${e}%</td><td>${status}</td></tr>`;
  });
  html += `</tbody></table></div></div>`;

  if (total === 0) {
    html += `<div class="card"><div class="card-body"><div class="empty-state"><div class="icon">📋</div><p>No submissions yet.</p><p style="font-size:11px;margin-top:6px">Share the form link with employees to begin collecting self-assessments.</p></div></div></div>`;
  } else {
    html += `<div class="card">
      <div class="card-head"><h2>All Submissions (${total})</h2>
        <div style="margin-left:auto;display:flex;gap:8px">
          <button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.2)" onclick="exportCSV()">↓ Export CSV</button>
        </div>
      </div>
      <div class="card-body" style="padding:0;overflow-x:auto"><table class="tbl">
        <thead><tr><th>Employee</th><th>Role</th><th>Dept</th><th>Self Score</th><th>Mgr Score</th><th>Status</th><th>Submitted</th><th></th></tr></thead>
        <tbody>`;
    all.forEach(s => {
      const mScore = s.mgrReview?.finalScore;
      const stMap = {
        'self_submitted':'<span class="status-pill st-self">Self Only</span>',
        'mgr_reviewed':'<span class="status-pill st-mgr">Mgr Reviewed</span>',
        'hr_calibrated':'<span class="status-pill st-hr">Calibrated</span>',
        'final':'<span class="status-pill st-final">Final</span>'
      };
      html += `<tr>
        <td style="font-weight:600;color:#1B3A5C">${s.name}</td>
        <td>${s.role}</td><td>${s.dept}</td>
        <td>${badgeHTML(s.finalScore,true)}</td>
        <td>${mScore ? badgeHTML(mScore,true) : '<span style="color:#ccc;font-size:11px">Pending</span>'}</td>
        <td>${stMap[s.status]||s.status}</td>
        <td>${fmtDate(s.submittedAt)}</td>
        <td><button class="btn btn-sm" onclick="showHRDetail('${s.id}')">View</button></td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;
  }
  document.getElementById('main').innerHTML = html;
}

function showHRDetail(id) {
  const sub = store_load('sub_'+id);
  if (!sub) return;
  const m = sub.mgrReview;
  const calib = sub.hrCalib;
  let rows = `
    <div class="detail-row"><span class="dl">Employee</span><span class="dr">${sub.name}</span></div>
    <div class="detail-row"><span class="dl">Role</span><span class="dr">${sub.role}</span></div>
    <div class="detail-row"><span class="dl">Department</span><span class="dr">${sub.dept}</span></div>
    <div class="detail-row"><span class="dl">Manager</span><span class="dr">${sub.manager}</span></div>
    <div class="detail-row"><span class="dl">Submitted</span><span class="dr">${fmtDate(sub.submittedAt)}</span></div>
    <div class="detail-row"><span class="dl">Self — Business</span><span class="dr">${sub.bizScore||'—'}/4</span></div>
    <div class="detail-row"><span class="dl">Self — Values</span><span class="dr">${sub.valScore||'—'}/4</span></div>
    <div class="detail-row"><span class="dl">Self — Final</span><span class="dr">${sub.finalScore||'—'}/4 ${badgeHTML(sub.finalScore,true)}</span></div>`;

  if (m) {
    rows += `<div class="separator"></div>
    <div class="detail-row"><span class="dl">Manager</span><span class="dr">${m.mgrName}</span></div>
    <div class="detail-row"><span class="dl">Mgr — Business</span><span class="dr">${m.bizScore||'—'}/4</span></div>
    <div class="detail-row"><span class="dl">Mgr — Values</span><span class="dr">${m.valScore||'—'}/4</span></div>
    <div class="detail-row"><span class="dl">Mgr — Final</span><span class="dr">${m.finalScore||'—'}/4 ${badgeHTML(m.finalScore,true)}</span></div>`;
  }

  // HR calibration form
  const calibScore = calib?.finalScore || m?.finalScore || sub.finalScore || '';
  const calibCat = calib?.finalCategory || (calibScore ? RLABELS[Math.round(calibScore)] : '');
  rows += `<div class="separator"></div>
    <div style="margin-bottom:8px;font-size:11px;font-weight:700;color:#1B3A5C;text-transform:uppercase;letter-spacing:.06em">HR Calibration</div>
    <div class="hr-calib-row">
      <div><label>Calibrated Final Score (1–4)</label><input type="number" id="hr_cal_score" min="1" max="4" step="0.1" value="${calibScore}" placeholder="e.g. 3.0"></div>
      <div><label>Final Category</label><select id="hr_cal_cat"><option value="">— Select —</option>${[4,3,2,1].map(r=>`<option value="${RLABELS[r]}"${calibCat===RLABELS[r]?' selected':''}>${r} — ${RLABELS[r]}</option>`).join('')}</select></div>
    </div>
    <div style="margin-bottom:10px"><label style="font-size:10px;font-weight:700;color:#6B6760;text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:4px">Calibration Notes</label>
    <textarea id="hr_cal_notes" rows="3" style="width:100%;border:0.5px solid #E0DDD8;border-radius:6px;padding:7px 10px;font-size:12px;font-family:inherit;outline:none;resize:vertical">${calib?.notes||''}</textarea></div>`;

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'hr-modal';
  overlay.innerHTML = `<div class="modal">
    <button class="modal-close" onclick="document.getElementById('hr-modal').remove()">×</button>
    <h3>${sub.name} — Assessment Detail</h3>
    ${rows}
    <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap">
      <button class="btn btn-navy" onclick="saveCalibration('${id}')">Save Calibration</button>
      <button class="btn btn-teal" onclick="markFinal('${id}')">Mark Final &amp; Notify Employee</button>
      <button class="btn" onclick="document.getElementById('hr-modal').remove()">Close</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

async function saveCalibration(id) {
  const sub = store_load('sub_'+id);
  if (!sub) return;
  const score = parseFloat(document.getElementById('hr_cal_score')?.value);
  const cat = document.getElementById('hr_cal_cat')?.value;
  const notes = document.getElementById('hr_cal_notes')?.value||'';
  sub.hrCalib = { finalScore: score||null, finalCategory: cat||null, notes, calibratedAt: new Date().toISOString() };
  sub.status = 'hr_calibrated';
  try {
    await store_save_async('sub_'+id, sub);
    document.getElementById('hr-modal')?.remove();
    toast('Calibration saved.');
    render();
  } catch(e) {
    toast('Failed to save calibration. Please try again.');
  }
}

async function markFinal(id) {
  const sub = store_load('sub_'+id);
  if (!sub) return;
  const score = parseFloat(document.getElementById('hr_cal_score')?.value);
  const cat = document.getElementById('hr_cal_cat')?.value;
  const notes = document.getElementById('hr_cal_notes')?.value||'';
  sub.hrCalib = { finalScore: score||null, finalCategory: cat||null, notes, calibratedAt: new Date().toISOString() };
  sub.status = 'final';
  try {
    await store_save_async('sub_'+id, sub);
    document.getElementById('hr-modal')?.remove();
    const fc = sub.hrCalib;
    const subject = encodeURIComponent(`Your Performance Rating 2025/26 — ${sub.name}`);
    const body = encodeURIComponent(
      `Dear ${sub.name},\n\nYour performance assessment for 2025/26 has been finalised following the executive calibration session.\n\nYour final rating: ${fc.finalScore||'?'}/4 — ${fc.finalCategory||'?'}\n\n${fc.notes?'Notes from HR:\n'+fc.notes+'\n\n':''}Please schedule a meeting with your line manager (${sub.manager}) to discuss your rating and development plan.\n\nKind regards,\nHR · ${CONFIG.ORG_NAME}`
    );
    window.location.href = `mailto:${sub.managerEmail}?subject=${subject}&body=${body}`;
    toast('Final rating saved. Email to employee has been prepared.');
    render();
  } catch(e) {
    toast('Failed to save. Please try again.');
  }
}

function exportCSV() {
  const all = store_list();
  const headers = ['Name','Role','Department','Manager','Self Biz Score','Self Values Score','Self Final Score','Self Category','Mgr Biz Score','Mgr Values Score','Mgr Final Score','Mgr Category','HR Calibrated Score','HR Category','Final Status','Submitted At'];
  const rows = all.map(s => {
    const m = s.mgrReview;
    const h = s.hrCalib;
    return [
      s.name, s.role, s.dept, s.manager,
      s.bizScore||'', s.valScore||'', s.finalScore||'', s.finalCategory||'',
      m?.bizScore||'', m?.valScore||'', m?.finalScore||'', m?.finalCategory||'',
      h?.finalScore||'', h?.finalCategory||'',
      s.status, fmtDate(s.submittedAt)
    ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(',');
  });
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Fulcrum_PM_Report_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Report downloaded as CSV.');
}


// ─────────────────────────────────────────────────────────────────────────────
// RESET
// ─────────────────────────────────────────────────────────────────────────────
function resetForm(isMgr) {
  if (!confirm('Reset all entered data for this form? This cannot be undone.')) return;
  if (isMgr) { mgrRatings = {}; } else { empRatings = {}; }
  render();
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN RENDER
// ─────────────────────────────────────────────────────────────────────────────
function render() {
  if (currentTab === 'employee') renderEmployee();
  else if (currentTab === 'manager') renderManager();
  else if (currentTab === 'hr') renderHR();
}

// Check URL params on load
window.addEventListener('DOMContentLoaded', async () => {
  await initStorage();
  const tab = getURLParam('tab');
  const id = getURLParam('id');
  if (tab === 'manager' && id) {
    currentSubId = id;
    currentTab = 'manager';
    document.querySelectorAll('.nav-tab').forEach(el => {
      el.classList.toggle('active', el.dataset.tab === 'manager');
    });
  }
  render();
});
</script>
